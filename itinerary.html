        async function openFlightPreview(flightNo) {
            const overlay = document.getElementById('flight-preview-overlay');
            const data = flightDatabase[flightNo];
            if (!data) return;

            const airlineName = data.airline[currentLang];
            document.getElementById('preview-no').innerText = flightNo;
            document.getElementById('preview-airline-banner').innerText = airlineName;
            
            const logoEl = document.getElementById('preview-airline-logo');
            logoEl.src = airlineLogos[airlineName] || '';
            logoEl.style.visibility = logoEl.src ? 'visible' : 'hidden';

            document.getElementById('preview-from-code').innerText = data.from;
            document.getElementById('preview-from-term').innerText = `航廈 ${data.fromTerm}`;
            document.getElementById('preview-to-code').innerText = data.to;
            document.getElementById('preview-to-term').innerText = `航廈 ${data.toTerm}`;
            document.getElementById('preview-dep').innerText = data.dep;
            document.getElementById('preview-arr').innerText = data.arr;
            document.getElementById('preview-dep-date').innerText = data.date;
            document.getElementById('preview-arr-date').innerText = data.date;
            document.getElementById('preview-duration').innerText = data.duration;

            overlay.style.display = 'flex';
        }

        function closeFlightPreview() {
            document.getElementById('flight-preview-overlay').style.display = 'none';
        }

        function copyFlightCode(event) {
            const code = document.getElementById('preview-no').innerText;
            
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(code);
            } else {
                 const el = document.createElement('textarea');
                 el.value = code;
                 document.body.appendChild(el);
                 el.select();
                 document.execCommand('copy');
                 document.body.removeChild(el);
            }
            
            const btn = event.currentTarget;
            const originalText = btn.innerText;
            btn.innerText = "已拷貝！";
            btn.classList.replace('bg-blue-600', 'bg-emerald-600');
            setTimeout(() => {
                 btn.innerText = originalText;
                 btn.classList.replace('bg-emerald-600', 'bg-blue-600');
            }, 1500);
        }

        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            document.querySelectorAll('.lang-zh').forEach(el => el.classList.toggle('hidden', currentLang !== 'zh'));
            document.querySelectorAll('.lang-en').forEach(el => el.classList.toggle('hidden', currentLang !== 'en'));
            document.getElementById('main-title').innerText = i18n[currentLang].mainTitle;
            renderNav();
            showSection(currentIndex === -1 ? 'prep' : currentIndex);
        }

        function renderNav() {
            const container = document.getElementById('date-nav-container');
            container.innerHTML = tripData.map((day, idx) => {
                 const parts = day.date.split('.');
                 const mShort = parts[0] === "03" ? "Mar" : "Apr";
                 const display = currentLang === 'zh' ? `<span class="text-xl font-black text-slate-800">${parts[1]}</span><span class="text-[9px] font-bold">${parts[0]}月</span>` 
                                                    : `<span class="text-xs font-black text-slate-800">${mShort}.${parts[1]}</span>`;
                 return `<button onclick="showSection(${idx})" id="nav-${idx}" class="flex-shrink-0 w-14 h-14 rounded-xl bg-white border border-slate-200 flex flex-col items-center justify-center shadow-sm transition-transform">${display}</button>`;
            }).join('');
        }

        function showSection(type) {
            const card = document.getElementById('content-card');
            const indicator = document.getElementById('step-indicator');
            const lang = i18n[currentLang];
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-nav', 'active-special-nav'));

            if (type === 'prep') {
                currentIndex = -1;
                document.getElementById('nav-prep').classList.add('active-special-nav');
                indicator.innerText = lang.prep;
                card.innerHTML = `
                    <div class="mb-4"><h2 class="text-3xl font-black text-slate-900 leading-tight">${lang.prep}</h2></div>
                    <div class="space-y-4">
                        <div class="p-5 bg-emerald-50 rounded-2xl border border-emerald-100 shadow-sm">
                            <p class="text-xl font-black text-emerald-900 mb-4">${lang.sgacTitle}</p>
                            <div class="flex gap-3">
                                <a href="https://eservices.ica.gov.sg/sgarrivalcard/" target="_blank" class="flex-1 text-center py-4 bg-emerald-600 text-white rounded-xl text-sm font-black shadow-md active:scale-95 transition-transform">${lang.officialWeb}</a>
                                <a href="https://ianchen.life/sgac-singapore-arrival-card/" target="_blank" class="flex-1 text-center py-4 bg-amber-500 text-white rounded-xl text-sm font-black shadow-md active:scale-95 transition-transform">${lang.tutorial}</a>
                            </div>
                        </div>
                        <ul class="space-y-5 p-2">
                            ${lang.prepItems.map(item => `
                                <li class="flex items-center gap-4 text-2xl font-black text-slate-800">
                                    <div class="w-4 h-4 rounded-full bg-emerald-400 ring-4 ring-emerald-50"></div>
                                    ${item}
                                </li>
                            `).join('')}
                        </ul>
                    </div>`;
            } else {
                currentIndex = type;
                document.getElementById(`nav-${currentIndex}`).classList.add('active-nav');
                const day = tripData[currentIndex];
                indicator.innerText = `DAY ${currentIndex + 1} / 8`;
                const dateHeader = currentLang === 'zh' ? `${day.date} (${day.week.zh})` : `${day.date} (${day.week.en})`;

                card.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-3xl font-black text-slate-900 leading-tight">${day.title[currentLang]}</h2>
                        <p class="text-lg font-black text-blue-600 mt-1 uppercase">${dateHeader}</p>
                    </div>
                    <div class="space-y-6 relative timeline-line">
                        ${day.items.map(item => {
                            if (item.type === 'flight') {
                                const fInfo = flightDatabase[item.flightNo];
                                const aName = fInfo.airline[currentLang];
                                const aLogo = airlineLogos[aName] || '';
                                return `
                                <div class="relative pl-9 pb-2">
                                    <div class="absolute left-0 top-1 w-5 h-5 rounded-full border-4 border-white bg-blue-600 ring-2 ring-blue-100"></div>
                                    <div class="flex items-center gap-2 mb-1">
                                       <span class="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded">${lang.flight}</span>
                                        <div class="flex items-center gap-2 flight-link" onclick="openFlightPreview('${item.flightNo}')">
                                           <img src="${aLogo}" class="airline-logo-sm" alt="logo" onerror="this.style.display='none'">
                                           <span class="text-xl font-black text-slate-900">${aName} ${item.flightNo}</span>
                                       </div>
                                    </div>
                                    <p class="text-base text-slate-600 font-bold">${item.detail}</p>
                                </div>`;
                            } else {
                                const timeLabel = item.time ? `<span class="text-xs font-black text-blue-600 block mb-1">⏰ ${item.time}</span>` : '';
                                return `
                                <div class="relative pl-9">
                                    <div class="absolute left-0 top-1 w-5 h-5 rounded-full border-4 border-white bg-amber-500 ring-2 ring-amber-100"></div>
                                    ${timeLabel}
                                    <div class="flex items-start justify-between gap-2">
                                        <h3 class="text-2xl font-black text-slate-900 flex-1">${item.name[currentLang]}</h3>
                                        <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(item.name.en + " Singapore")}" target="_blank" class="bg-slate-100 p-2 rounded-xl text-slate-600 active:bg-slate-200">
                                           <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z"></path></svg>
                                       </a>
                                    </div>
                                    <p class="text-xl text-slate-700 font-medium mt-1">${item.desc[currentLang]}</p>
                                </div>`;
                            }
                        }).join('')}
                    </div>
                    <div class="mt-8 pt-6 border-t-2 border-slate-100">
                        <div class="flex items-center gap-4 mb-3">
                            <div class="text-3xl">🏨</div>
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">${lang.hotel}</p>
                                <p class="text-xl font-black text-slate-900">Dao by Dorsett AMTD</p>
                            </div>
                        </div>
                        <p class="text-base text-slate-800 font-bold bg-slate-50 p-4 rounded-2xl">${lang.hotelAddress}</p>
                    </div>`;
            }
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function moveStep(step) {
            let next = currentIndex + step;
            if (next < -1) next = -1;
            if (next > 7) next = 7;
            if (next === -1) showSection('prep');
            else showSection(next);
        }

        window.onload = () => {
            renderNav();
            showSection(0);
            setTimeout(() => {
                 const loader = document.getElementById('loading-overlay');
                 loader.style.opacity = '0';
                 setTimeout(() => loader.style.display = 'none', 500);
            }, 600);
        };
    </script>
</body>
</html>
